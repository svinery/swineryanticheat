name: Build & Release WPF

on:
  push:
    branches: [ "main" ]      # main'e push: sadece derleme kontrolü
    tags: [ "v*" ]            # v* etiketi: derle + GitHub Release oluştur
  workflow_dispatch:           # Manuel tetikleme butonu

permissions:
  contents: write              # Release oluşturmak için gerekli

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Kodu İndir
      uses: actions/checkout@v4

    - name: .NET 8 Kurulumu
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: WPF Uygulamasını Derle (tek dosya exe)
      run: |
        dotnet publish SwineryAntiCheat.WPF/SwineryAntiCheat.WPF.csproj `
          -c Release -r win-x64 --self-contained true `
          -p:PublishSingleFile=true `
          -p:IncludeNativeLibrariesForSelfExtract=true `
          -p:SatelliteResourceLanguages=en `
          -p:DebugType=none

    - name: Paketle (exe + blacklist.txt -> zip)
      shell: pwsh
      run: |
        $pub = "SwineryAntiCheat.WPF/bin/Release/net8.0-windows/win-x64/publish"
        # GUI publish blacklist.txt'yi kopyalamaz; pakete elle ekliyoruz.
        Copy-Item "blacklist.txt" "$pub/blacklist.txt" -Force
        # Tek exe + blacklist (temiz paket; native dll'ler exe içinde gömülü).
        Compress-Archive -Path "$pub/SwineryAC_GUI.exe","$pub/blacklist.txt" `
          -DestinationPath "SwineryAC-GUI-Windows.zip" -Force
        Get-ChildItem $pub | Select-Object Name,Length
        Get-Item "SwineryAC-GUI-Windows.zip" | Select-Object Name,Length

    # main'e normal push'ta: indirilebilir artifact (etiket yoksa)
    - name: Artifact olarak yükle
      if: ${{ !startsWith(github.ref, 'refs/tags/') }}
      uses: actions/upload-artifact@v4
      with:
        name: SwineryAC-GUI-Windows
        path: SwineryAC-GUI-Windows.zip
        retention-days: 7

    # v* etiketi push'lanınca: kalıcı GitHub Release + zip eki
    - name: GitHub Release oluştur
      if: ${{ startsWith(github.ref, 'refs/tags/') }}
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      shell: pwsh
      run: |
        gh release create "${{ github.ref_name }}" "SwineryAC-GUI-Windows.zip" `
          --title "SwineryAC ${{ github.ref_name }}" `
          --notes "Windows WPF arayuz surumu. 3 katmanli hile tespiti: isim entropisi + SHA256 + imphash. Zip icinde SwineryAC_GUI.exe + blacklist.txt. Admin ile calistirin."
